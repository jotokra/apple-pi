# Publish the site to GitHub Pages on every push to main.
#
# The site has two parts, assembled into one Pages artifact:
#   /            ← the hand-crafted marketing landing (docs/index.html)
#   /guide/      ← the rendered docs site (VitePress, built from guide/)
#
# Repo setting required: Settings → Pages → Source = "GitHub Actions".
name: pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'guide/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install docs deps
        run: npm ci
      - name: Build the guide (VitePress)
        run: npm run docs:build
      - name: Assemble Pages artifact (landing at root, guide at /guide/)
        run: |
          set -euo pipefail
          mkdir _site
          # Marketing landing → site root. docs/index.html is self-contained
          # (inline CSS/JS; no sibling assets), so a single copy suffices.
          cp docs/index.html _site/index.html
          # Rendered guide → /guide/. VitePress base is /apple-pi/guide/.
          mkdir _site/guide
          cp -r guide/.vitepress/dist/. _site/guide/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
